<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snus Clicker</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- Welt Transition Overlay -->
    <div id="worldTransition"></div>

    <!-- Top Bar -->
    <div class="top-bar glass">
        <div class="world-section">
            <span id="worldName">Golden Paradise</span>
            <button id="worldButton">🌍 Welt wechseln</button>
        </div>

        <div class="stats">
            <div>Cookies: <span id="cookieCount" aria-live="polite">0</span></div>
            <div>Pro Sekunde: <span id="cps" aria-live="polite">0</span></div>
            <div>Prestige Cookies: <span id="prestigeCount" aria-live="polite">0</span></div>  
        </div>
    </div>

    <!-- Hauptbereich -->
    <div class="game-container">

        <!-- Gebäude links -->
        <div id="leftBuildings" class="building-column"></div>

        <!-- Cookie Mitte -->
        <div class="cookie-container">
            <div id="cookieClickArea" role="button" tabindex="0" aria-label="Cookie klicken">
                <img id="mainCookie" src="assets/cookies/world1.png" alt="Cookie">
                <div id="clickEffectContainer"></div>
            </div>
        </div>

        <!-- Gebäude rechts -->
        <div id="rightBuildings" class="building-column"></div>

    </div>

    <!-- Prestige Panel -->
    <div class="prestige-panel glass">
        <h3>💎 Prestige Upgrades</h3>
         <div id="prestigeSummary" class="prestige-summary"></div>
        <div id="prestigeUpgrades"></div>
        <button id="prestigeButton">Prestige Reset</button>
    </div>

    <!-- Kauf Optionen -->
    <div class="buy-options glass">
        <button data-buy="1">x1</button>
        <button data-buy="10">x10</button>
        <button data-buy="100">x100</button>
        <button data-buy="max">MAX</button>
    </div>

    
    <!-- Milestones -->
    <div class="milestones-panel glass">
        <h3>🎯 Milestones</h3>
        <div id="milestonesList" class="milestones-list"></div>
    </div>
    
     <!-- Save Controls -->
    <div class="save-controls glass">
        <button id="exportSaveButton">📤 Save exportieren</button>
        <button id="importSaveButton">📥 Save importieren</button>
        <button id="resetSaveButton">🗑️ Save zurücksetzen</button>
    </div>

    <!-- Settings Controls -->
    <div class="settings-controls glass">
        <label>
            Autosave (ms)
            <input id="autosaveIntervalInput" type="number" min="1000" max="60000" step="500">
            <small>1000–60000 ms</small>
        </label>
        <label>
            UI Refresh (ms)
            <input id="uiRefreshIntervalInput" type="number" min="16" max="1000" step="10">
            <small>16–1000 ms</small>
        </label>
        <button id="resetSettingsButton" type="button">↺ Settings zurücksetzen</button>
    </div>


    <!-- Autosave Anzeige -->
    <div id="autosaveIndicator">💾 Gespeichert</div>

    <!-- Module Scripts -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
