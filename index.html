<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snus Clicker</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- Welt Transition Overlay -->
    <div id="worldTransition"></div>

    <!-- Top Bar -->
    <div class="top-bar glass">
        <div class="world-section">
            <span id="worldName">Golden Paradise</span>
            <button id="worldButton">🌍 Welt wechseln</button>
        </div>

        <div class="stats">
            <div><span id="labelSnus">Snus</span>: <span id="cookieCount" aria-live="polite">0</span></div>
            <div><span id="labelCps">Pro Sekunde</span>: <span id="cps" aria-live="polite">0</span></div>
            <div><span id="labelPrestige">Prestige-Snus</span>: <span id="prestigeCount" aria-live="polite">0</span></div>
            <div id="nextWorldProgress" class="next-world-progress" aria-live="polite"></div>
        </div>
    </div>

    <!-- Hauptbereich -->
    <div class="game-container">

        <!-- Gebäude links -->
        <div id="leftBuildings" class="building-column"></div>

        <!-- Cookie Mitte -->
        <div class="cookie-container">
            <div id="cookieClickArea" role="button" tabindex="0" aria-label="Snus klicken">
                <img id="mainCookie" src="assets/cookies/world1.png" alt="Snus">
                <div id="clickEffectContainer"></div>
            </div>
        </div>

        <!-- Gebäude rechts -->
        <div id="rightBuildings" class="building-column"></div>

    </div>

    <!-- Prestige Panel -->
    <div class="prestige-panel glass">
        <h3>💎 Prestige Upgrades</h3>
         <div id="prestigeSummary" class="prestige-summary"></div>
        <div id="prestigeUpgrades"></div>
        <button id="prestigeButton">Prestige Reset</button>
        <div id="prestigeResetProgress" class="prestige-reset-progress" aria-live="polite"></div>
    </div>

    <!-- Kauf Optionen -->
    <div class="buy-options glass">
        <button data-buy="1">x1</button>
        <button data-buy="10">x10</button>
        <button data-buy="100">x100</button>
        <button data-buy="max">MAX</button>
    </div>

        <button id="milestonesToggleButton" class="milestones-toggle-button glass" type="button">🎯 Milestones</button>

    <!-- Milestones -->
    <div id="milestonesPanel" class="milestones-panel glass">
        <div class="milestones-header">
            <h3 id="milestonesTitle">🎯 Milestones</h3>
            <button id="milestonesCloseButton" type="button">✕</button>
        </div>. 
        <div id="milestonesList" class="milestones-list"></div>
    </div>

    <button id="settingsToggleButton" class="settings-toggle-button glass" type="button">⚙️ Einstellungen</button>

    <!-- Settings Controls -->
    <div id="settingsPanel" class="settings-panel glass" hidden>
        <div class="settings-header">
            <h3 id="settingsTitle">Einstellungen</h3>
            <button id="settingsCloseButton" type="button">✕</button>
        </div>
        <label>
            <span id="settingSoundLabel">Sound</span>
            <select id="soundEnabledInput">
                <option value="on">An</option>
                <option value="off">Aus</option>
            </select>
        </label>
        <label>
            <span id="settingLanguageLabel">Sprache</span>
            <select id="languageInput">
                <option value="de">Deutsch</option>
                <option value="en">Englisch</option>
            </select>
        </label>
        <label>
            <span id="settingBackgroundLabel">Hintergrundfarbe</span>
            <input id="backgroundColorInput" type="color" value="#dff6ff">
        </label>
                <div class="settings-save-actions">
            <button id="exportSaveButton" type="button">📤 Save exportieren</button>
            <button id="importSaveButton" type="button">📥 Save importieren</button>
        </div>
        <button id="resetSaveButton" type="button">🗑️ Save zurücksetzen</button>
        <small id="resetSaveHint">Achtung: löscht den Spielstand.</small>
        <button id="resetSettingsButton" type="button">↺ Einstellungen zurücksetzen</button>
    </div>


    <!-- Autosave Anzeige -->
    <div id="autosaveIndicator">💾 Gespeichert</div>

    <!-- Module Scripts -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
