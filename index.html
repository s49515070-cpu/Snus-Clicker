<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Snus Clicker</title>

    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        #cookie {
            width: 260px;
            height: 260px;
            font-size: 80px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background-color: orange;
            margin: 20px;
            transition: 0.1s;
        }

        #cookie:hover {
            transform: scale(1.05);
        }

        .section {
            margin-top: 30px;
        }

        .box {
            background: #222;
            padding: 15px;
            margin: 10px auto;
            width: 300px;
            border-radius: 8px;
        }

        button {
            cursor: pointer;
            padding: 6px 10px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<h1>🍪 SNUS CLICKER 🍪</h1>

<h2>Cookies: <span id="cookieCount">0</span></h2>
<h3>Produktion pro Sekunde: <span id="production">0</span></h3>

<button id="cookie">🍪</button>

<div class="section">
    <h2>Gebäude</h2>
    <div id="buildings" class="box"></div>
</div>

<div class="section">
    <h2>Prestige</h2>
    Prestige Cookies: <span id="prestigeCount">0</span><br><br>
    <button id="prestigeButton">Prestige Reset</button>

    <h3>Prestige Upgrades</h3>
    <div id="prestigeUpgrades" class="box"></div>
</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
